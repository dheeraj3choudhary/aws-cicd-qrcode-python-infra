<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --accent:    #00e5ff;
      --accent-dim:#007a8a;
      --text:      #e8e8e8;
      --muted:     #666;
      --error:     #ff4d4d;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 480px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      padding: 0.65rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1rem;
    }

    .field { margin-bottom: 1rem; }

    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover { background: #33eaff; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .result {
      margin-top: 2rem;
      text-align: center;
      display: none;
    }

    .result img {
      border-radius: var(--radius);
      border: 1px solid var(--border);
      max-width: 100%;
      background: #fff;
      padding: 12px;
    }

    .download-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.55rem 1.4rem;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      width: auto;
      text-decoration: none;
      transition: background 0.2s;
    }

    .download-btn:hover { background: rgba(0,229,255,0.08); }

    .error-msg {
      margin-top: 1rem;
      color: var(--error);
      font-size: 0.875rem;
      text-align: center;
      display: none;
    }

    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>QR Code Generator</h1>
  <p class="subtitle">Enter any text or URL to generate a QR code</p>

  <div class="card">
    <div class="field">
      <label for="data">Text or URL</label>
      <input type="text" id="data" placeholder="https://example.com" autocomplete="off" />
    </div>

    <div class="row">
      <div class="field">
        <label for="size">Box Size (1-50)</label>
        <input type="number" id="size" value="10" min="1" max="50" />
      </div>
      <div class="field">
        <label for="border">Border (0-20)</label>
        <input type="number" id="border" value="4" min="0" max="20" />
      </div>
    </div>

    <button id="generateBtn" onclick="generate()">
      <span id="btnText">Generate QR Code</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <p class="error-msg" id="errorMsg"></p>
  </div>

  <div class="result" id="result">
    <img id="qrImage" src="" alt="Generated QR Code" />
    <br />
    <a class="download-btn" id="downloadBtn" download="qrcode.png">Download PNG</a>
  </div>

  <script>
    async function generate() {
      const data   = document.getElementById('data').value.trim();
      const size   = parseInt(document.getElementById('size').value);
      const border = parseInt(document.getElementById('border').value);
      const btn    = document.getElementById('generateBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const errorMsg = document.getElementById('errorMsg');
      const result = document.getElementById('result');

      errorMsg.style.display = 'none';
      result.style.display = 'none';

      if (!data) {
        showError('Please enter some text or a URL.');
        return;
      }

      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';

      try {
        const response = await fetch('/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data, size, border }),
        });

        if (!response.ok) {
          const err = await response.json();
          showError(err.error || 'Something went wrong.');
          return;
        }

        const blob = await response.blob();
        const url  = URL.createObjectURL(blob);

        document.getElementById('qrImage').src = url;
        document.getElementById('downloadBtn').href = url;
        result.style.display = 'block';

      } catch (err) {
        showError('Network error. Is the server running?');
      } finally {
        btn.disabled = false;
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    document.getElementById('data').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') generate();
    });
  </script>

</body>
</html>
