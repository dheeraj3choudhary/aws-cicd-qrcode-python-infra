version: 0.0
os: linux

files:
  - source: scripts/
    destination: /opt/qrcode/scripts
  - source: imagedefinitions.json
    destination: /opt/qrcode

permissions:
  - object: /opt/qrcode/scripts
    pattern: "*.sh"
    mode: "0755"
    type:
      - file

hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 120
      runas: root

  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 60
      runas: root

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: root